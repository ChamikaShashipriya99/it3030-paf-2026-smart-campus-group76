name: Smart Campus CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-backend:
    name: Build Backend (Spring Boot)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
          
      - name: Make Maven Wrapper Executable
        run: chmod +x mvnw
        
      - name: Build and Test with Maven
        run: ./mvnw clean install

  build-frontend:
    name: Build Frontend (React Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
        
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install
        
      - name: Build React App
        run: npm run build

  deploy:
    name: Deployment Stage
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy Backend to Render
        run: |
          if [ -n "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}" ]; then
            curl -X GET "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}"
          else
            echo "Skipping Backend Deploy: Secret RENDER_BACKEND_DEPLOY_HOOK not set."
          fi
          
      - name: Deploy Frontend to Render
        run: |
          if [ -n "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}" ]; then
            curl -X GET "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}"
          else
            echo "Skipping Frontend Deploy: Secret RENDER_FRONTEND_DEPLOY_HOOK not set."
          fi
